<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketing Brand Plan</title>
<style>
:root{
  --bg:        #0a0b0f;
  --surface:   #13151a;
  --surface2:  #1a1d24;
  --surface3:  #22252e;
  --border:    #252830;
  --border2:   #2e3240;
  --text:      #f0f2f7;
  --text2:     #8b92a8;
  --text3:     #50566a;
  --accent:    #F5D000;
  --purple:    #7B6FF0;
  --purple-dim:#2a2550;
  --green:     #2ebb77;
  --green-dim: #0d2e1e;
  --red:       #e05555;
  --radius:    12px;
  --radius-sm: 8px;
}

/* Smooth transitions on view switches */
#month-view, .bv-wrap{-webkit-transition:opacity .18s ease;transition:opacity .18s ease;}
#month-view.fading{opacity:0;}
.bv-wrap.fading{opacity:0;}

/* Subtle gradient on active cards */
.brand-card.is-active-card{background:linear-gradient(135deg,var(--surface) 0%,var(--surface2) 100%);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);}
.wrap{padding:1.5rem 1.25rem;max-width:1100px;margin:0 auto;}

/* BRAND BAR */
.brand-bar{display:-webkit-box;display:-webkit-flex;display:flex;-webkit-flex-direction:row;flex-direction:row;gap:0;margin-bottom:1.5rem;border:1px solid var(--border);border-radius:var(--radius);overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.brand-bar::-webkit-scrollbar{display:none;}
.brand-bar{-webkit-transform:translateZ(0);transform:translateZ(0);}
.brand-icon{-webkit-flex:0 0 auto;flex:0 0 auto;width:80px;height:44px;cursor:pointer;transition:background .15s;display:-webkit-box;display:-webkit-flex;display:flex;-webkit-box-align:center;-webkit-align-items:center;align-items:center;-webkit-box-pack:center;-webkit-justify-content:center;justify-content:center;padding:6px 8px;border-right:1px solid var(--border);}
.brand-icon:last-child{border-right:none;}
.brand-icon:hover{background:var(--surface2);opacity:1;}
.bi-logo{width:100%;height:24px;background:transparent;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;overflow:hidden;}
.bi-logo img{height:24px;width:auto;max-width:88%;display:block;}
.bi-logo.has-img{background:transparent;}
.brand-icon.active-brand{background:var(--surface2);}
.brand-icon.active-brand .bi-logo img{-webkit-filter:drop-shadow(0 0 4px var(--accent));filter:drop-shadow(0 0 4px var(--accent));}
.bi-name{display:none;}
@media(max-width:600px){
  .brand-icon{height:44px;padding:6px 4px;}
  .bi-logo{height:28px;}
  .bi-logo img{height:28px;width:auto;max-width:88%;}
  .wrap{padding:1rem .75rem;}
  .active-grid{grid-template-columns:1fr;}
  .bv-grid{grid-template-columns:1fr 1fr;}
  .month-nav{overflow-x:auto;}
  .bv-quarter-tabs{flex-direction:column;}
  .bv-qtab{text-align:center;}
  .top{flex-direction:column;gap:8px;}
  .market-tabs-wrap{align-items:stretch;width:100%;}
  .market-tabs{width:100%;}
  .mtab-wrap{flex:1;}
  .mtab{width:100%;text-align:center;}
}

/* TOP */
.top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:10px;}
.top-title{font-size:20px;font-weight:600;color:var(--text);}
.top-sub{font-size:13px;color:var(--text3);margin-top:3px;}
.market-tabs-wrap{display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
.market-total-row{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;text-align:center;width:100%;}
.market-total-row span{font-size:20px;font-weight:700;color:var(--accent);display:block;letter-spacing:0;text-transform:none;margin-top:2px;text-align:center;}
.market-tabs{display:flex;gap:6px;}
.mtab-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;}
.mtab-spend{font-size:11px;font-weight:600;color:var(--accent);min-height:14px;text-align:center;}
.mtab{padding:8px 20px;font-size:13px;font-weight:500;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text2);cursor:pointer;transition:all .15s;}
.mtab:hover{background:var(--surface3);color:var(--text);}
.mtab.active{background:linear-gradient(135deg,#1a1060,#0F1035);color:#fff;border-color:#1a1060;}

/* MONTH NAV */
.month-nav{display:flex;align-items:center;margin-bottom:1.25rem;gap:0;border:1px solid var(--border2);border-radius:var(--radius-sm);overflow:hidden;}
.mnav-btn{flex:0 0 auto;padding:9px 13px;background:var(--surface2);border:none;cursor:pointer;color:var(--text2);font-size:14px;transition:background .15s;z-index:1;}
.mnav-btn:first-child{border-right:1px solid var(--border);}
.mnav-btn:last-child{border-left:1px solid var(--border);}
.mnav-btn:hover{background:var(--surface3);color:var(--text);}
.month-pills{display:-webkit-box;display:-webkit-flex;display:flex;-webkit-flex:1;flex:1;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.month-pills::-webkit-scrollbar{display:none;}

.mpill{-webkit-flex:0 0 auto;flex:0 0 auto;padding:9px 18px;font-size:13px;font-weight:500;background:var(--surface2);border:none;border-right:1px solid var(--border);cursor:pointer;color:var(--text2);white-space:nowrap;transition:all .15s;}
.mpill:last-child{border-right:none;}
.mpill:hover{background:var(--surface3);color:var(--text);}
.mpill.active{background:linear-gradient(90deg,#1a1060,#0F1035);color:#fff;}

/* SPEND STRIP */
.spend-strip{display:-webkit-box;display:-webkit-flex;display:flex;gap:8px;margin-bottom:1.25rem;-webkit-flex-wrap:wrap;flex-wrap:wrap;}
.spend-tile{flex:1;min-width:100px;background:var(--surface);border-radius:var(--radius);padding:12px 16px;border:1px solid var(--border);}
.stl{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;}
.spend-total{border-top:2px solid var(--text2);}
.spend-super{border-top:2px solid #4ade80;}
.spend-multi{border-top:2px solid var(--purple);}
.spend-legacy{border-top:2px solid var(--text3);}
.stv{font-size:24px;font-weight:600;color:var(--accent);}
.sts{font-size:12px;color:var(--text3);margin-top:3px;}

/* SECTION LABEL */
.section-label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.9rem;display:flex;align-items:center;gap:8px;}
.section-label::before{content:"";display:inline-block;width:3px;height:12px;background:var(--purple);border-radius:2px;flex-shrink:0;}

/* ACTIVE CARDS */
.active-grid{display:-ms-grid;display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:1.75rem;}
.brand-card{border-radius:var(--radius);border:1px solid var(--border);padding:18px;cursor:pointer;transition:border-color .2s,background .2s,box-shadow .2s;background:var(--surface);}
.brand-card:hover{border-color:var(--border2);background:var(--surface2);box-shadow:0 4px 24px rgba(0,0,0,.3);}
.card-top{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.card-logo{width:44px;height:44px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;overflow:hidden;border:1px solid var(--border2);}
.card-logo img{width:100%;height:100%;object-fit:contain;padding:4px;}
.card-logo.has-img{background:transparent;}
.card-brand{font-size:15px;font-weight:600;color:var(--text);}
.card-tier{font-size:12px;color:var(--text3);margin-top:2px;}
.card-tier-badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;margin-top:3px;letter-spacing:.03em;}
.tier-superbrand{background:rgba(26,107,60,.3);color:#4ade80;border:1px solid rgba(74,222,128,.2);}
.tier-multi-brand{background:rgba(91,79,207,.3);color:#a89ff5;border:1px solid rgba(168,159,245,.2);}
.tier-legacy{background:rgba(74,74,90,.3);color:#8888aa;border:1px solid rgba(136,136,170,.2);}
.card-spend{font-size:14px;font-weight:600;color:var(--accent);margin-bottom:6px;cursor:default;}
.card-spend span{font-size:11px;font-weight:400;color:var(--text3);margin-left:5px;}

/* Active brand cards get purple top accent */
.brand-card.card-active-accent{border-top:2px solid var(--purple);}
.card-spend span{font-size:10px;font-weight:400;color:var(--text3);margin-left:4px;}
.card-focus{font-size:12px;color:var(--text2);line-height:1.55;margin-bottom:8px;}
.card-headline{font-size:15px;line-height:1.6;margin-bottom:12px;}
.card-wo{background:var(--surface3);border:1px solid var(--border2);border-radius:8px;padding:8px 12px;margin-bottom:8px;margin-top:-4px;}

.card-wo-text{font-size:14px;font-weight:600;color:var(--text);line-height:1.4;}
.wo-secondary{font-size:11px;color:var(--text3);margin-top:5px;padding-top:5px;border-top:1px solid var(--border);}.card-headline[style]{margin-bottom:12px;}
.card-focus-body{font-size:13px;font-weight:400;color:var(--text2);}
.bv-focus-body{font-size:12px;font-weight:400;color:var(--text2);}
.card-ch-section{margin-top:2px;}
.card-ch-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;display:flex;align-items:center;gap:5px;}.card-ch-label::before{content:"";display:inline-block;width:2px;height:9px;background:var(--border2);border-radius:1px;}
.card-chs{display:-webkit-box;display:-webkit-flex;display:flex;-webkit-flex-wrap:wrap;flex-wrap:wrap;gap:4px;}
.ch-tag{font-size:11px;padding:4px 10px;border-radius:20px;background:var(--surface3);color:var(--text2);border:1px solid var(--border);}
.ch-tag-new{font-size:11px;padding:4px 10px;border-radius:20px;background:rgba(0,210,190,.12);color:#00d2be;border:1px solid rgba(0,210,190,.35);font-weight:600;}
.ch-tag-new::before{content:"★ ";font-size:9px;}
.card-missing{font-size:11px;font-weight:600;color:var(--red);}

/* BAU SECTION */
.bau-section{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}.bau-section .bau-header{border-left:3px solid var(--border2);}
.bau-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--surface);cursor:pointer;user-select:none;transition:background .15s;}
.bau-header:hover{background:var(--surface2);}
.bau-hl{display:flex;flex-direction:column;gap:4px;}
.bau-logo-strip{display:-webkit-box;display:-webkit-flex;display:flex;gap:8px;-webkit-box-align:center;-webkit-align-items:center;align-items:center;margin-top:10px;-webkit-flex-wrap:wrap;flex-wrap:wrap;}
.bau-strip-item{width:56px;height:48px;cursor:pointer;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);display:flex;align-items:center;justify-content:center;padding:6px;transition:border-color .15s,background .15s;}
.bau-strip-item:hover{border-color:var(--border2);background:var(--surface3);}
.bau-strip-logo{width:100%;height:100%;border-radius:0;border:none;background:transparent;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;overflow:hidden;}
.bau-strip-logo img{max-width:100%;max-height:36px;width:auto;height:auto;object-fit:contain;}
.bau-strip-logo.has-img{background:transparent;}
.bau-title{font-size:14px;font-weight:600;color:var(--text);}
.bau-sub{font-size:12px;color:var(--text3);}
.bau-chev{font-size:11px;color:var(--text3);transition:transform .2s;}
.bau-chev.open{transform:rotate(180deg);}
.bau-body{display:none;border-top:1px solid var(--border);}
.bau-body.open{display:block;}
.bau-tb{border-bottom:1px solid var(--border);}
.bau-tb:last-child{border-bottom:none;}
.bau-what{padding:14px 18px 12px;background:var(--surface2);}
.bau-wt{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;}
.bau-wd{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:8px;}
.bau-chs{display:flex;flex-wrap:wrap;gap:4px;}
.bau-ch{font-size:11px;padding:4px 10px;border-radius:20px;background:var(--surface3);color:var(--text2);border:1px solid var(--border);}
.bau-logos-row{padding:12px 18px;display:-webkit-box;display:-webkit-flex;display:flex;-webkit-flex-wrap:wrap;flex-wrap:wrap;gap:10px;background:var(--surface);-webkit-box-align:center;-webkit-align-items:center;align-items:center;}
.bau-logo-item{width:64px;height:64px;cursor:pointer;transition:opacity .15s,border-color .15s;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 4px;}
.bau-logo-item:hover{opacity:.8;border-color:var(--border2);}
.bau-item-spend{font-size:9px;font-weight:600;color:var(--accent);white-space:nowrap;}
.bau-spend-total{font-size:12px;font-weight:500;color:var(--accent);margin-left:8px;}
.bau-logo-item:hover{opacity:.65;}
.bau-pill-logo{width:100%;height:32px;border-radius:0;border:none;background:transparent;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;overflow:hidden;}
.bau-pill-logo img{width:100%;height:28px;object-fit:contain;}
.bau-pill-logo.has-img{background:transparent;}

/* BRAND VIEW */
.bv-wrap{display:none;}
.bv-wrap.open{display:block;}
.bv-header{display:flex;align-items:center;gap:20px;margin-bottom:1.5rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border);}
.bv-back{padding:6px 13px;font-size:12px;font-weight:500;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text2);cursor:pointer;flex-shrink:0;transition:all .15s;}
.bv-back:hover{background:var(--surface3);color:var(--text);}
.bv-logo-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0;}
.bv-logo{width:80px;height:80px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;overflow:hidden;border:1px solid var(--border2);}
.bv-logo img{width:100%;height:100%;object-fit:contain;padding:8px;}
.bv-logo.has-img{background:transparent;}
.bv-tier{display:inline-block;font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px;letter-spacing:.03em;text-align:center;}
.bv-tier.tier-superbrand{background:rgba(26,107,60,.3);color:#4ade80;border:1px solid rgba(74,222,128,.2);}
.bv-tier.tier-multi-brand{background:rgba(91,79,207,.3);color:#a89ff5;border:1px solid rgba(168,159,245,.2);}
.bv-tier.tier-legacy{background:rgba(74,74,90,.3);color:#8888aa;border:1px solid rgba(136,136,170,.2);}
.bv-name{display:none;}
.bv-quarter-tabs{display:flex;gap:8px;margin-bottom:1.5rem;}
.bv-qtab{padding:7px 18px;font-size:13px;font-weight:500;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text2);cursor:pointer;transition:all .15s;}
.bv-qtab:hover{background:var(--surface3);color:var(--text);}
.bv-qtab.active{background:linear-gradient(135deg,#1a1060,#0F1035);color:#fff;border-color:#1a1060;}
.bv-summary{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:1.5rem;display:flex;flex-direction:column;gap:10px;}
.bv-summary-wo{display:flex;flex-direction:column;gap:3px;}
.bv-summary-wo-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);}
.bv-summary-wo-text{font-size:15px;font-weight:600;color:var(--text);}
.bv-summary-wo-sec{font-size:11px;color:var(--text3);margin-top:2px;}
.bv-summary-focus{display:flex;flex-direction:column;gap:3px;padding-top:10px;border-top:1px solid var(--border);}
.bv-summary-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--purple);}
.bv-summary-text{font-size:13px;color:var(--text2);line-height:1.5;}
.bv-wo-box{font-size:12px;font-weight:500;color:var(--text2);background:var(--surface3);border:1px solid var(--border2);border-radius:6px;padding:6px 9px;margin-bottom:6px;}
.bv-mkt-block{margin-bottom:1.75rem;}
.bv-mkt-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;padding-bottom:.75rem;border-bottom:1px solid var(--border);}
.bv-mkt-label{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;display:flex;align-items:center;gap:6px;}.bv-mkt-label::before{content:"";display:inline-block;width:3px;height:12px;background:var(--purple);border-radius:2px;}
.bv-tot{font-size:13px;font-weight:600;color:var(--accent);}
.bv-tot span{font-size:10px;font-weight:400;color:var(--text3);margin-left:3px;}
.bv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));-webkit-column-gap:10px;column-gap:10px;-webkit-row-gap:10px;row-gap:10px;}
.bv-card{border-radius:var(--radius);border:1px solid var(--border);padding:16px;background:var(--surface);}
.bv-card.is-active{border-color:var(--ac,var(--purple));background:var(--surface2);border-top:2px solid var(--purple);}
.bv-mname{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}
.bv-spend{font-size:16px;font-weight:600;color:var(--accent);margin-bottom:6px;}
.bv-focus{font-size:13px;line-height:1.6;margin-bottom:8px;}
.bv-bau{font-size:12px;color:var(--text3);font-style:italic;margin-bottom:6px;}
.bv-missing{font-size:11px;font-weight:600;color:var(--red);margin-bottom:6px;}
.bv-chs{display:flex;flex-wrap:wrap;gap:3px;}
.bv-ch{font-size:11px;padding:3px 9px;border-radius:20px;background:var(--surface3);color:var(--text2);border:1px solid var(--border);}

.empty-state{padding:2.5rem;text-align:center;color:var(--text3);font-size:13px;}

/* MODAL */
.modal-bg{display:none;position:fixed;top:0;right:0;bottom:0;left:0;background:rgba(0,0,0,.6);z-index:100;-webkit-box-align:center;-webkit-align-items:center;align-items:center;-webkit-box-pack:center;-webkit-justify-content:center;justify-content:center;}
.modal-bg.open{display:-webkit-box;display:-webkit-flex;display:flex;}
.modal{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border2);padding:1.5rem;max-width:400px;width:90%;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.5);}
.mx{position:absolute;top:12px;right:14px;font-size:20px;cursor:pointer;color:var(--text3);background:none;border:none;line-height:1;transition:color .15s;}
.mx:hover{color:var(--text);}
.mt2{font-size:17px;font-weight:600;color:var(--text);margin-bottom:3px;}
.mm2{font-size:12px;color:var(--text3);margin-bottom:1rem;}
.ms{font-size:11px;font-weight:700;color:var(--text3);margin:14px 0 6px;text-transform:uppercase;letter-spacing:.06em;}
.mv{font-size:13px;color:var(--text2);line-height:1.6;}
.mtag{display:inline-block;background:var(--surface3);border-radius:var(--radius-sm);padding:4px 10px;font-size:12px;color:var(--text2);margin:2px 2px 2px 0;border:1px solid var(--border);}
</style>
</head>
<body>
<div class="wrap">

  <!-- Brand bar -->
  <div class="brand-bar" id="brand-bar"></div>

  <!-- Month view -->
  <div id="month-view">
    <div class="top">
      <div>
        <div class="top-title">Marketing Brand Plan</div>
        <div class="top-sub">Month by month view &middot; click any card for details &middot; click a logo above to see brand plan</div>
      </div>
      <div class="market-tabs-wrap">
        <div class="market-total-row" id="market-total-row"></div>
        <div class="market-tabs" id="market-tabs">
          <div class="mtab-wrap">
            <div class="mtab-spend" id="spend-fi"></div>
            <button class="mtab active" onclick="setMarket('Finland')">Finland</button>
          </div>
          <div class="mtab-wrap">
            <div class="mtab-spend" id="spend-ca"></div>
            <button class="mtab" onclick="setMarket('Canada')">Canada</button>
          </div>
        </div>
      </div>
    </div>
    <div class="month-nav">
      <button class="mnav-btn" onclick="prevMonth()">&#8592;</button>
      <div class="month-pills" id="month-pills"></div>
      <button class="mnav-btn" onclick="nextMonth()">&#8594;</button>
    </div>
    <div class="spend-strip" id="spend-strip" style="display:none"></div>
    <div id="content"></div>
  </div>

  <!-- Brand view -->
  <div class="bv-wrap" id="bv-wrap">
    <div class="bv-header">
      <button class="bv-back" onclick="closeBrandView()">&#8592; All brands</button>
      <div class="bv-logo-wrap">
        <div class="bv-logo" id="bv-logo"></div>
        <div class="bv-tier" id="bv-tier"></div>
      </div>
      <div><div class="bv-name" id="bv-name"></div></div>

function fmt(v){
  if(!v||v==='')return null;
  const n=parseFloat(String(v).replace(/[^0-9.]/g,''));
  if(isNaN(n)||n===0)return null;
  if(n>=1e6)return '\u20ac'+(n/1e6).toFixed(1)+'M';
  if(n>=1000)return '\u20ac'+(n/1000).toFixed(0)+'k';
  return '\u20ac'+n;
}
function sumSpend(rows){
  var seen={};
  var t=0;
  var any=false;
  for(var i=0;i<rows.length;i++){
    var r=rows[i];
    if(r.investment>0){
      var key=r.group_brands.slice().sort().join('|')+'|'+r.month+'|'+r.market;
      if(!seen[key]){
        seen[key]=true;
        t+=r.group_investment;
        any=true;
      }
    }
  }
  return any?t:null;
}
function sumSpendTrue(rows){ return sumSpend(rows); }
function getTier(b){return(RAW.find(r=>r.brand===b)||{tier:'Multi-Brand'}).tier;}
function mkLogo(brand, cls, extraStyle){
  var url=LOGOS[brand];
  var c=TC[getTier(brand)]||TC['Legacy'];
  if(url){
    var img='<img src="'+url+'" alt="'+brand+'" data-brand="'+brand+'" onerror="logoImgError(this, this.dataset.brand)">';
    return '<div class="'+cls+' has-img">'+img+'</div>';
  }
  return '<div class="'+cls+'" style="background:'+c.l+';color:'+c.lt+(extraStyle?';'+extraStyle:'')+'">'+(brand.slice(0,2).toUpperCase())+'</div>';
}

function focusToHTML(focus, month, headlineClass, bodyClass, brand, mkt){
  const clean = focus.replace(/^BAU\s*[-–]\s*/i, '').trim();
  const parts = clean.split(/[,·]+/).map(s=>s.trim()).filter(Boolean);
  if(parts.length === 0) return '';

  const box = 'background:rgba(123,111,240,.08);border:1px solid rgba(123,111,240,.2);border-radius:8px;padding:10px 12px;';
  const label = '<span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--purple);display:block;margin-bottom:5px">Headline</span>';
  const primaryText = parts[0];

  if(parts.length === 1){
    return '<div class="'+headlineClass+'" style="'+box+'">'+label+'<strong style="color:var(--text)">'+primaryText+'</strong></div>';
  }
  const rest = parts.slice(1);
  const last = rest.pop();
  const middle = rest.length > 0 ? rest.join(', ') + ' and ' + last : last;
  const monthSuffix = month ? ' in ' + month : '';
  return '<div class="'+headlineClass+'" style="'+box+'">'+label+'<strong style="color:var(--text)">'+primaryText+'</strong> <span class="'+bodyClass+'">— also promoting '+middle+monthSuffix+'.</span></div>';
}

function formatFocusInner(focus, month, brand, mkt){
  const clean = focus.replace(/^BAU\s*[-–]\s*/i, '').trim();
  const parts = clean.split(/[,·]+/).map(s=>s.trim()).filter(Boolean);
  if(parts.length === 0) return '';
  const primaryText = parts[0];
  if(parts.length === 1) return '<strong style="color:var(--text)">'+primaryText+'</strong>';
  const rest = parts.slice(1);
  const last = rest.pop();
  const middle = rest.length > 0 ? rest.join(', ') + ' and ' + last : last;
  const monthSuffix = month ? ' in ' + month : '';
  return '<strong style="color:var(--text)">'+primaryText+'</strong> <span class="card-focus-body">— also promoting '+middle+monthSuffix+'.</span>';
}

function formatFocus(focus, month, brand, mkt){
  return focusToHTML(focus, month, 'card-headline', 'card-focus-body', brand, mkt);
}

function formatFocusBv(focus, month, brand, mkt){

  var fiEl=document.getElementById('spend-fi');
  var caEl=document.getElementById('spend-ca');

  if(fiEl) fiEl.textContent=fiTotal?fmt(fiTotal):'';

          var wo=getWelcomeOffer(r.brand,market);
          var box='background:rgba(123,111,240,.08);border:1px solid rgba(123,111,240,.2);border-radius:8px;padding:10px 12px;margin-bottom:8px;';
          var label='<span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--purple);display:block;margin-bottom:5px">Headline</span>';
          if(!r.focus) return '<div style="'+box+'"><div class="card-missing">Missing data</div></div>';
          var headlineHTML=formatFocusInner(r.focus,month,r.brand,market);
          if(!wo||!wo.primary) return '<div class="card-headline" style="'+box+'">'+label+headlineHTML+'</div>';
          var sec=wo.secondary?'<div class="wo-secondary">Also: '+wo.secondary+'</div>':'';
          return '<div class="card-headline" style="'+box+'">'+label+headlineHTML+'<div class="wo-divider"></div><div class="card-wo-text">'+wo.primary+'</div>'+sec+'</div>';
        })()}
        ${chs.length?`<div class="card-ch-section"><div class="card-ch-label">Channels</div><div class="card-chs">${chs.slice(0,4).map(c=>c.endsWith('*')?`<span class="ch-tag-new">${c.slice(0,-1)}</span>`:`<span class="ch-tag">${c}</span>`).join('')}${chs.length>4?`<span class="ch-tag">+${chs.length-4} more</span>`:''}</div></div>`:''}
      </div>`;
    });
    html+=`</div>`;
  } else {
    html+=`<div class="empty-state">No specifically promoted brands this month.</div>`;
  }

  if(bau.length){
    const tg={};
    bau.forEach(r=>{if(!tg[r.tier])tg[r.tier]=[];tg[r.tier].push(r);});
    html+=`<div class="section-label" style="margin-top:1.5rem">BAU marketing</div>
    <div class="bau-section">
      <div class="bau-header" onclick="toggleBau()">
        <div class="bau-hl">
          <div class="bau-title">${bau.length} brand${bau.length!==1?'s':''} running business as usual${sumSpend(bau)?` <span class="bau-spend-total">${fmt(sumSpend(bau))}</span>`:''}</div>
          <div class="bau-sub">Standard welcome offer &middot; existing channel mix &middot; consistent investment</div>
          <div class="bau-logo-strip">${bau.map(r=>`<div class="bau-strip-item" title="${r.brand}">${mkLogo(r.brand,'bau-strip-logo','')}</div>`).join('')}</div>
        </div>
        <div class="bau-chev${bauOpen?' open':''}" id="bau-chev">&#9660;</div>
      </div>
      <div class="bau-body${bauOpen?' open':''}" id="bau-body">`;
    Object.entries(tg).forEach(([tier,tRows])=>{
      const chs=(BAU_CH[tier]||'').split(',').map(s=>s.trim()).filter(Boolean);
      html+=`<div class="bau-tb">
        <div class="bau-what">
          <div class="bau-wt">${getTierLabel(tier)}</div>
          <div class="bau-wd">${BAU_DESC[tier]||''}</div>
          <div class="bau-chs">${chs.map(c=>c.endsWith('*')?`<span class="bau-ch" style="background:rgba(0,210,190,.12);color:#00d2be;border:1px solid rgba(0,210,190,.35);font-weight:600">★ ${c.slice(0,-1)}</span>`:`<span class="bau-ch">${c}</span>`).join('')}</div>
        </div>
        <div class="bau-logos-row">`;
      tRows.forEach(r=>{
        var bau_spend=r.investment?fmt(r.investment):'';
        html+=`<div class="bau-logo-item ${r.investment?'has-spend':''}" title="${r.brand}" onclick='openM(${JSON.stringify({brand:r.brand,month,tier:r.tier,focus:r.focus,channels:r.channels,investment:r.investment,group_investment:r.group_investment,group_size:r.group_size,group_brands:r.group_brands}).replace(/'/g,"&#39;")})'>
          ${mkLogo(r.brand,'bau-pill-logo','')}
          ${r.investment?`<div class="bau-item-spend">${fmt(r.investment)}</div>`:''}
        </div>`;
      });
      html+=`</div></div>`;
    });
    html+=`</div></div>`;
  }
  document.getElementById('content').innerHTML=html;
}

function toggleBau(){
  bauOpen=!bauOpen;
  document.getElementById('bau-body').classList.toggle('open',bauOpen);
  document.getElementById('bau-chev').classList.toggle('open',bauOpen);
}

function setBvQuarter(q, el){
  bvQuarter=q;
  document.querySelectorAll('.bv-qtab').forEach(function(t){t.classList.toggle('active',t.dataset.q===q);});
  renderBrandContent();
}

function openBrandView(brand){
  bvQuarter='Q2';
  activeBrand=brand;
  buildBrandBar();
  document.getElementById('month-view').style.display='none';
  document.getElementById('bv-wrap').classList.add('open');
  document.querySelectorAll('.bv-qtab').forEach(function(t){t.classList.toggle('active',t.dataset.q==='Q2');});
  const tier=getTier(brand);
  const c=TC[tier];

  const bvLogo=document.getElementById('bv-logo');
  bvLogo.innerHTML='';
  bvLogo.className='bv-logo';
  if(LOGOS[brand]){
    bvLogo.classList.add('has-img');
    const img=document.createElement('img');
    img.src=LOGOS[brand]; img.alt=brand;
    img.onerror=function(){bvLogo.classList.remove('has-img');bvLogo.style.background=c.l;bvLogo.style.color=c.lt;bvLogo.textContent=brand.slice(0,2).toUpperCase();};
    bvLogo.appendChild(img);
  } else {
    bvLogo.style.background=c.l; bvLogo.style.color=c.lt;
    bvLogo.textContent=brand.slice(0,2).toUpperCase();
  }
  document.getElementById('bv-name').textContent=brand;
  const bvTierEl=document.getElementById('bv-tier');
  bvTierEl.textContent=getTierLabel(tier);
  bvTierEl.className='bv-tier tier-'+getTierLabel(tier).replace(' ','-').toLowerCase();

  renderBrandContent();
}

function getBrandRawPoints(brand, quarter){
  var months = quarter==='Q2' ? ['April','May','June'] : ['July','August','September'];
  var points = [];
  ['Finland','Canada'].forEach(function(mkt){
    months.forEach(function(m){
      var r=RAW.find(function(x){return x.brand===brand&&x.market===mkt&&x.month===m;});
      if(!r||!r.focus)return;
      var clean=r.focus.replace(/^BAU\s*[-\u2013]\s*/i,'').trim();
      clean.split(/[\xb7,]+/).forEach(function(part){
        part=part.trim();
        if(part && !/^welcome offer$/i.test(part) && points.indexOf(part)===-1) points.push(part);
      });
    });
  });
  return points;
}

  'Beazt|Q2': "Beazt will launch on the 19th May across Finland and Canada. Following the launch we have a huge moment in June with the Beazt Fight PPV on the 13th June, supported by new marketing efforts including Influencer promotion, Whitehat PPC ads and Radio. In Canada we will also align the June push with the World Cup.",
  'Beazt|Q3': "In Q3 Beazt will activate around the UFC International Fight Week and World Cup Final in July across both markets. August sees a new Welcome Offer launch alongside the start of the domestic football season. We maintain consistent Welcome Offer activity through September to close out the quarter.",
  'Flamez|Q2': "In Q2 Flamez will run BAU Welcome Offer activity in Finland. In Canada we are testing Affiliates as a new channel to drive Welcome Offer sign-ups across all three months.",
  'Flamez|Q3': "In Q3 we will increase our marketing efforts on Flamez across both markets, introducing Influencer marketing in Finland and adding Radio, Influencer and Affiliates in Canada. Canada will also see major product activations including the Jackpot product launch and App push in August and September.",
  'Blingi|Q2': "Blingi Q2 main marketing focus will be on Affiliates promoting the Welcome Offer across Finland, testing this as a new acquisition channel throughout the quarter.",
  'Blingi|Q3': "Blingi will run consistent BAU Welcome Offer activity in Finland through Q3, maintaining the existing channel mix.",
  'Speedz|Q2': "Speedz will run BAU Welcome Offer activity across both Finland and Canada throughout Q2, maintaining the standard channel mix.",
  'Speedz|Q3': "Speedz will continue with BAU Welcome Offer activity across both markets through Q3 with no major campaign changes planned.",
  'Berriez|Q2': "Berriez will run BAU Welcome Offer activity across Finland and Canada throughout Q2, maintaining consistent investment and channel mix.",
  'Berriez|Q3': "Berriez will continue BAU Welcome Offer activity across both markets through Q3 with no major campaign changes planned.",
  'Tuplaus|Q2': "Tuplaus will run BAU Welcome Offer activity in Finland throughout Q2.",
  'Tuplaus|Q3': "In Q3 Tuplaus will introduce a new Game Focus Welcome Offer in August and September in Finland, supported by CRM x-sell as a new channel to drive targeted reactivation.",
  'Caxino|Q2': "Caxino launches a new Welcome Offer in Finland in April and May before moving into BAU activity in June across both markets.",
  'Caxino|Q3': "Caxino will run BAU Welcome Offer activity in Finland through Q3. In Canada the focus shifts to X-Sell and Reactivation from July onwards.",
  'Wheelz|Q2': "Wheelz will run BAU Welcome Offer activity across both markets in Q2, with a new Welcome Offer launching in Finland in June.",
  'Wheelz|Q3': "Wheelz continues BAU Welcome Offer activity in Finland through Q3. In Canada the focus moves to X-Sell and Reactivation from July through September.",
  'Spinz|Q2': "Spinz will run BAU Welcome Offer activity across both markets in Q2, with a new Welcome Offer launching in Finland in June.",
  'Spinz|Q3': "Spinz will run BAU Welcome Offer activity in Finland through Q3. In Canada the focus shifts to X-Sell and Reactivation from July onwards.",
  'Chipz|Q2': "Chipz kicks off Q2 in Finland with a Relaunch and New Design in both April and May, giving the brand a fresh look before moving into BAU activity in June.",
  'Chipz|Q3': "Chipz will run BAU Welcome Offer activity in Finland through Q3. In Canada the focus moves to X-Sell and Reactivation from July through September.",
};

function generateBrandSummary(brand, quarter, points, containerEl){
  var key=brand+'|'+quarter;
  var text=BRAND_SUMMARIES[key];
  if(text){
    containerEl.innerHTML='<span style="font-size:13px;color:var(--text2);line-height:1.6">'+text+'</span>';
  } else if(points.length){
    containerEl.innerHTML='<span style="font-size:13px;color:var(--text2);line-height:1.6">'+points.join(' · ')+'</span>';
  } else {
    containerEl.innerHTML='<span style="font-size:13px;color:var(--text3);">Running standard welcome offer activity.</span>';
  }
}

function renderBrandContent(){
  var brand=activeBrand;
  if(!brand)return;
  var tier=getTier(brand);
  var c=TC[tier];
  var html='';
  var bvMonths = bvQuarter==='Q2' ? ['April','May','June'] : ['July','August','September'];

  // Quarter summary
  var wo=getWelcomeOffer(brand,'Finland');
  html+='<div class="bv-summary">';
  if(wo&&wo.primary){
    html+='<div class="bv-summary-wo"><span class="bv-summary-wo-label">Welcome Offer</span><span class="bv-summary-wo-text">'+wo.primary+'</span>';
    if(wo.secondary) html+='<span class="bv-summary-wo-sec">Sports: '+wo.secondary+'</span>';
    html+='</div>';
  }
  html+='<div class="bv-summary-focus"><span class="bv-summary-label">'+bvQuarter+' Campaign Focus</span><span class="bv-summary-text" id="bv-summary-text-'+brand.replace(/\s/g,'_')+'-'+bvQuarter+'">Generating...</span></div>';
  html+='</div>';

  ['Finland','Canada'].forEach(function(mkt){
    var mrows=bvMonths.map(function(m){return RAW.find(function(r){return r.brand===brand&&r.market===mkt&&r.month===m;});}).filter(Boolean);
    if(!mrows.length)return;
    var tot=sumSpend(mrows);
    html+='<div class="bv-mkt-block"><div class="bv-mkt-row"><div class="bv-mkt-label">'+mkt+'</div>'+(tot?'<div class="bv-tot">'+fmt(tot)+'<span>'+bvQuarter+' total</span></div>':'')+'</div><div class="bv-grid">';
    mrows.forEach(function(r){
      var isBau2=isBau(r.focus);
      var isMissing=!r.focus||r.focus==='';
      var isAct=!isBau2&&!isMissing;
      var chs=(r.channels||(isBau2?BAU_CH[tier]||'':'')).split(',').map(function(s){return s.trim();}).filter(Boolean);
      var wo2=getWelcomeOffer(r.brand,mkt);

      html+='<div class="bv-card'+(isAct?' is-active':'')+'" style="'+(isAct?'--ac:'+c.c+'88':'')+'">';
      html+='<div class="bv-mname">'+r.month+'</div>';
      if(r.investment) html+='<div class="bv-spend">'+fmt(r.investment)+(r.group_size>1?' <span style="font-size:11px;font-weight:400;color:var(--text3)">est. per brand</span>':'')+'</div>';

      // Welcome offer box (no label — obvious from context)
      if(wo2&&wo2.primary){
        html+='<div class="bv-wo-box">'+wo2.primary+'</div>';
      }

      // Headline — skip if purely BAU with no extra context
      if(isMissing){
        html+='<div class="bv-missing">Missing data</div>';
      } else if(isBau2){
        // Strip "BAU - " prefix, show remaining events if any
        var cleanFocus=r.focus.replace(/^BAU\s*[-–]\s*/i,'').trim();
        // Only show if there's something beyond "Welcome Offer"
        var extras=cleanFocus.split(/[,·]+/).map(function(s){return s.trim();}).filter(function(s){return s&&!/^welcome offer$/i.test(s);});
        if(extras.length){
          html+='<div class="bv-focus" style="font-size:11px;color:var(--text2);margin-bottom:6px;">'+extras.join(' · ')+'</div>';
        }
      } else {
        html+=formatFocusBv(r.focus,r.month,r.brand,mkt);
      }

      if(chs.length){
        html+='<div class="bv-chs">'+chs.slice(0,3).map(function(ch){
          return ch.endsWith('*')
            ? '<span class="bv-ch" style="background:rgba(0,210,190,.12);color:#00d2be;border:1px solid rgba(0,210,190,.35);font-weight:600">★ '+ch.slice(0,-1)+'</span>'
            : '<span class="bv-ch">'+ch+'</span>';
        }).join('')+(chs.length>3?'<span class="bv-ch">+'+( chs.length-3)+'</span>':'')+'</div>';
      }
      html+='</div>';
    });
    html+='</div></div>';
  });
  document.getElementById('bv-content').innerHTML=html;
  // Async generate the brand summary
  var summaryEl=document.getElementById('bv-summary-text-'+brand.replace(/\s/g,'_')+'-'+bvQuarter);
  if(summaryEl){
    var pts=getBrandRawPoints(brand,bvQuarter);
    generateBrandSummary(brand,bvQuarter,pts,summaryEl);
  }
}

function closeBrandView(){
  activeBrand=null;
  buildBrandBar();
  document.getElementById('bv-wrap').classList.remove('open');
  document.getElementById('month-view').style.display='block';
}

function openM(d){
  if(typeof d==='string')d=JSON.parse(d);
  document.getElementById('m-title').textContent=d.brand+' \u2014 '+ALL_MONTHS[monthIdx];
  document.getElementById('m-meta').textContent=d.tier+' \u00b7 '+market;
  document.getElementById('m-focus').textContent=d.focus||'\u2014';
  const chs=(d.channels||(d.focus&&d.focus.startsWith('BAU')?BAU_CH[d.tier]||'':'')).split(',').map(s=>s.trim()).filter(Boolean);
  const cw=document.getElementById('m-chs-w');
  if(chs.length){
    cw.style.display='block';
    var hasNew=chs.some(function(c){return c.endsWith('*');});
    var ce=document.getElementById('m-chs');
    ce.innerHTML=chs.map(function(c){
      return c.endsWith('*')
        ? '<span class="mtag" style="background:rgba(0,210,190,.12);color:#00d2be;border:1px solid rgba(0,210,190,.35);font-weight:600">★ '+c.slice(0,-1).trim()+'</span>'
        : '<span class="mtag">'+c+'</span>';
    }).join('');
    if(hasNew) ce.innerHTML+='<div style="margin-top:8px;font-size:10px;color:var(--text3);">★ Highlighted channel</div>';
  }
  else cw.style.display='none';
  var sw=document.getElementById('m-sp-w');
  var spEl=document.getElementById('m-sp');
  if(d.investment>0){
    sw.style.display='block';
    var spHtml=fmt(d.investment);
    if(d.group_size>1){
      spHtml+=' <span style="color:var(--text3);font-size:11px;">per brand (est.)</span><br><span style="color:var(--text3);font-size:11px;">Group total: '+fmt(d.group_investment)+' across '+d.group_size+' brands</span>';
    }
    spEl.innerHTML=spHtml;
  } else {
    sw.style.display='none';
  }
  document.getElementById('mbg').classList.add('open');
}
function closeMod(e){
  if(!e||e.target===document.getElementById('mbg')||e.currentTarget.tagName==='BUTTON')
    document.getElementById('mbg').classList.remove('open');
}
if(document.readyState==="loading"){
  document.addEventListener("DOMContentLoaded",render);
}else{
  render();
}
</script>
